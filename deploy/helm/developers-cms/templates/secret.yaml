{{- if and .Values.secret.create (not .Values.secret.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "dcms.fullname" . }}-env
  labels:
    {{- include "dcms.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation
type: Opaque
stringData:
  DATABASE_URL: {{ include "dcms.databaseUrl" . | quote }}
  PAYLOAD_SECRET: {{ include "dcms.payloadSecret" . | quote }}
{{- end }}
