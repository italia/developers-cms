apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dcms.fullname" . }}
  labels:
    {{- include "dcms.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  {{- if .Values.media.persistence.enabled }}
  strategy:
    type: Recreate
  {{- end }}
  selector:
    matchLabels:
      {{- include "dcms.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "dcms.selectorLabels" . | nindent 8 }}
      {{- $checksumMat := include "dcms.secretRolloutChecksumMaterial" . | trim }}
      {{- if $checksumMat }}
      annotations:
        checksum/helm-secret-env: {{ $checksumMat | sha256sum | quote }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.app.image.repository }}:{{ .Values.app.image.tag }}"
          imagePullPolicy: {{ .Values.app.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.app.port }}
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: {{ .Values.app.port | quote }}
            - name: HOSTNAME
              value: "0.0.0.0"
            {{- $siteUrl := include "dcms.siteUrl" . | trim }}
            {{- if $siteUrl }}
            - name: SITE_URL
              value: {{ $siteUrl | quote }}
            {{- end }}
            {{- range .Values.app.extraEnv }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
          envFrom:
            - secretRef:
                name: {{ include "dcms.secretName" . }}
          {{- if .Values.media.persistence.enabled }}
          volumeMounts:
            - name: media
              mountPath: {{ .Values.media.persistence.mountPath }}
          {{- end }}
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/access
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 6
          resources:
            {{- toYaml .Values.app.resources | nindent 12 }}
      {{- if .Values.media.persistence.enabled }}
      volumes:
        - name: media
          persistentVolumeClaim:
            claimName: {{ include "dcms.mediaClaimName" . }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
